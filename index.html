<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PUBG RANDOMIZER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a2a1f, #0a0f0a);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 1100px;
            width: 100%;
            background: rgba(10, 14, 8, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 60px 40px 60px 40px;
            border: 2px solid rgba(210, 180, 70, 0.7);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 200, 0.1);
            padding: 30px 25px 40px 25px;
            text-align: center;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f5e56b, #c9a03d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 3px rgba(0,0,0,0.4);
            margin-bottom: 10px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .pan-icon {
            font-size: 2.2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            transform: rotate(-15deg);
        }

        .sub {
            color: #bcab6e;
            font-weight: 500;
            border-top: 1px dashed #5a4a2a;
            display: inline-block;
            padding-top: 8px;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .badge-universal {
            background: #3a4a2a;
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 10px;
            vertical-align: middle;
            color: #e9f5cf;
        }

        .badge-ground {
            background: #6a3a2a;
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 5px;
            vertical-align: middle;
            color: #ffccaa;
        }

        .weapons-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 35px;
            margin: 30px 0 35px;
        }

        .weapon-slot {
            background: linear-gradient(145deg, #0e130b, #080c06);
            border-radius: 32px;
            padding: 25px 15px;
            width: 280px;
            min-width: 250px;
            flex: 1;
            box-shadow: 0 12px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,200,0.1);
            border: 1px solid #4e6b2c;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .weapon-slot::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(210, 180, 70, 0.1), transparent);
            transition: left 0.5s;
        }

        .weapon-slot:hover::before {
            left: 100%;
        }

        .weapon-slot:hover {
            transform: translateY(-8px);
            border-color: #cfb053;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
        }

        .slot-label {
            font-size: 1.2rem;
            background: #2a2416;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 40px;
            color: #eace7b;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid #7e6a3e;
        }

        .weapon-icon {
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
        }

        .weapon-icon svg {
            width: 85px;
            height: 85px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            transition: transform 0.2s;
        }

        .weapon-slot:hover .weapon-icon svg {
            transform: scale(1.05);
        }

        .weapon-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f7f3da;
            text-shadow: 0 2px 0 #2f3e1c;
            margin: 12px 0 5px;
            word-break: break-word;
            background: #1e2817b3;
            display: inline-block;
            padding: 0 12px;
            border-radius: 60px;
        }

        .weapon-type {
            font-size: 0.85rem;
            color: #b9b27a;
            background: #1e2218;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 10px;
        }

        .randomize-btn {
            background: linear-gradient(145deg, #2c3e1f, #1e2a14);
            border: none;
            padding: 16px 32px;
            font-size: 1.7rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffeaac;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f130b;
            transition: 0.07s linear;
            width: 80%;
            max-width: 380px;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 10px auto;
            font-family: inherit;
        }

        .randomize-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #0f130b;
        }

        .reroll-hint {
            font-size: 0.85rem;
            margin-top: 20px;
            color: #7f8c5e;
            background: #1f261a70;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        @keyframes pop {
            0% { transform: scale(0.85); opacity: 0; }
            80% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-weapon {
            animation: pop 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        footer {
            margin-top: 28px;
            font-size: 0.7rem;
            color: #6c6e4e;
        }

        @media (max-width: 700px) {
            .weapons-panel {
                gap: 20px;
            }
            .weapon-name {
                font-size: 1.4rem;
            }
            .weapon-icon svg {
                width: 65px;
                height: 65px;
            }
            .randomize-btn {
                font-size: 1.3rem;
                padding: 12px 20px;
            }
            .card {
                padding: 20px 16px;
            }
            .game-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="game-title">
        <span class="pan-icon">🍳</span>
        PUBG RANDOMIZER
        <span class="pan-icon" style="transform: rotate(15deg);">🍳</span>
    </div>
    <div class="sub">
        🎲 нажми — получи 2 пушки | играй только с ними 🎲
        <span class="badge-universal">🌍 все карты</span>
        <span class="badge-ground">🎯 ground loot</span>
    </div>

    <div class="weapons-panel">
        <div class="weapon-slot" id="weaponSlot1">
            <div class="slot-label">ОСНОВНОЕ</div>
            <div class="weapon-icon" id="weaponIcon1"></div>
            <div class="weapon-name" id="weaponName1">—</div>
            <div class="weapon-type" id="weaponType1">жду рандома</div>
        </div>

        <div class="weapon-slot" id="weaponSlot2">
            <div class="slot-label">ВТОРОЕ</div>
            <div class="weapon-icon" id="weaponIcon2"></div>
            <div class="weapon-name" id="weaponName2">—</div>
            <div class="weapon-type" id="weaponType2">жду рандома</div>
        </div>
    </div>

    <button class="randomize-btn" id="rollBtn">🎲 ВЫБРАТЬ ОРУЖИЕ 🎲</button>
    <div class="reroll-hint">⚡ нажми, чтобы получить новый набор | только эти два до конца матча ⚡</div>
    <footer>🔥 только наземный лут | нет крэйтов, нет карточных эксклюзивов 🔥</footer>
</div>

        if (name.includes('glock')) {
            return `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="40" y="49" width="36" height="8" rx="2" fill="#3a3a3a" stroke="#aaa" stroke-width="1.2"/>
                <rect x="66" y="51" width="7" height="5" rx="1" fill="#1a1a1a" stroke="#777" stroke-width="1"/>
                <rect x="38" y="57" width="4" height="8" rx="1" fill="#4a4a4a" stroke="#999" stroke-width="1"/>
                <text x="53" y="63" font-size="4" fill="#888" text-anchor="middle">GLOCK</text>
            </svg>`;
        }

        // Crossbow
        if (name.includes('crossbow')) {
            return `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="18" y1="50" x2="82" y2="50" stroke="#aa8a4a" stroke-width="3"/>
                <path d="M28 40 L18 50 L28 60" stroke="#886a3a" stroke-width="2" fill="none"/>
                <rect x="44" y="46" width="12" height="8" rx="2" fill="#6a4a2a" stroke="#ccaa6a" stroke-width="1"/>
                <line x1="82" y1="50" x2="90" y2="50" stroke="#bb9944" stroke-width="1.5"/>
                <text x="48" y="68" font-size="5" fill="#aa8a4a" text-anchor="middle">BOW</text>
            </svg>`;
        }

        // Дефолт
        return `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="32" y="42" width="44" height="12" rx="2" fill="#5a5a5a" stroke="#bbb" stroke-width="1.2"/>
            <rect x="66" y="44" width="10" height="8" rx="2" fill="#3a3a3a" stroke="#999" stroke-width="1"/>
            <rect x="30" y="54" width="5" height="16" rx="2" fill="#6a5a4a" stroke="#ccaa7a" stroke-width="1"/>
        </svg>`;
    }

    // СПИСОК ОРУЖИЯ (ground loot, все карты)
    const weaponsList = [
        { name: "M416", type: "Штурмовая винтовка" },
        { name: "SCAR-L", type: "Штурмовая винтовка" },
        { name: "AKM", type: "Штурмовая винтовка" },
        { name: "Beryl M762", type: "Штурмовая винтовка" },
        { name: "M16A4", type: "Штурмовая винтовка" },
        { name: "ACE32", type: "Штурмовая винтовка" },
        { name: "Kar98k", type: "Снайперская винтовка" },
        { name: "M24", type: "Снайперская винтовка" },
        { name: "Dragunov SVD", type: "Марксманская винтовка" },
        { name: "Mini-14", type: "Марксманская винтовка" },
        { name: "SLR", type: "Марксманская винтовка" },
        { name: "UMP-45", type: "Пистолет-пулемёт" },
        { name: "Vector", type: "Пистолет-пулемёт" },
        { name: "MP5K", type: "Пистолет-пулемёт" },
        { name: "PP-19 Bizon", type: "Пистолет-пулемёт" },
        { name: "Tommy Gun", type: "Пистолет-пулемёт" },
        { name: "DBS", type: "Дробовик" },
        { name: "S12K", type: "Дробовик" },
        { name: "S686", type: "Дробовик" },
        { name: "M249", type: "Пулемёт" },
        { name: "DP-28", type: "Пулемёт" },
        { name: "Crossbow", type: "Арбалет" },
        { name: "Deagle", type: "Пистолет" },
        { name: "Glock 18C", type: "Пистолет" }
    ];

    function getRandomWeapon() {
        const randomIndex = Math.floor(Math.random() * weaponsList.length);
        return { ...weaponsList[randomIndex] };
    }

    function getTwoDistinctWeapons() {
        let weaponA = getRandomWeapon();
        let weaponB = getRandomWeapon();
        let attempts = 0;
        while (weaponA.name === weaponB.name && attempts < 6) {
            weaponB = getRandomWeapon();
            attempts++;
        }
        return [weaponA, weaponB];
    }

    const weaponName1 = document.getElementById('weaponName1');
    const weaponIcon1 = document.getElementById('weaponIcon1');
    const weaponType1 = document.getElementById('weaponType1');
    const weaponName2 = document.getElementById('weaponName2');
    const weaponIcon2 = document.getElementById('weaponIcon2');
    const weaponType2 = document.getElementById('weaponType2');
    const rollBtn = document.getElementById('rollBtn');
    const slot1Div = document.getElementById('weaponSlot1');
    const slot2Div = document.getElementById('weaponSlot2');

    function updateWeaponDisplay(weapon, iconContainer, nameElem, typeElem) {
        nameElem.innerText = weapon.name;
        typeElem.innerText = weapon.type;
        iconContainer.innerHTML = getWeaponSVG(weapon.name);
    }

    function animateSlot(slotElement) {
        slotElement.classList.add('animate-weapon');
        setTimeout(() => {
            slotElement.classList.remove('animate-weapon');
        }, 350);
    }

    function updateWeapons() {
        const [weaponObj1, weaponObj2] = getTwoDistinctWeapons();
        updateWeaponDisplay(weaponObj1, weaponIcon1, weaponName1, weaponType1);
        updateWeaponDisplay(weaponObj2, weaponIcon2, weaponName2, weaponType2);
        animateSlot(slot1Div);
        animateSlot(slot2Div);
        rollBtn.style.transform = "scale(0.98)";
        setTimeout(() => { rollBtn.style.transform = ""; }, 100);
    }

    function initRandomOnLoad() {
        const [firstWeapon, secondWeapon] = getTwoDistinctWeapons();
        updateWeaponDisplay(firstWeapon, weaponIcon1, weaponName1, weaponType1);
        updateWeaponDisplay(secondWeapon, weaponIcon2, weaponName2, weaponType2);
        setTimeout(() => {
            animateSlot(slot1Div);
            animateSlot(slot2Div);
        }, 100);
    }

    rollBtn.addEventListener('click', () => {
        updateWeapons();
        rollBtn.style.boxShadow = "0 5px 0 #0f130b";
        setTimeout(() => {
            rollBtn.style.boxShadow = "0 8px 0 #0f130b";
        }, 80);
    });

    initRandomOnLoad();

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !e.repeat && document.activeElement !== rollBtn) {
            e.preventDefault();
            updateWeapons();
            rollBtn.style.transform = "scale(0.96)";
            setTimeout(() => { if(rollBtn) rollBtn.style.transform = ""; }, 120);
        }
    });
</script>
</body>
</html>
