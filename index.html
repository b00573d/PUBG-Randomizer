<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG RANDOMIZER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #1a2a1f, #0a0f0a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(10, 14, 8, 0.9);
            border-radius: 40px;
            border: 2px solid #c9a03d;
            padding: 30px;
            text-align: center;
            max-width: 900px;
            width: 100%;
        }
        h1 {
            font-size: 2.2rem;
            color: #f5e56b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .pan {
            font-size: 2rem;
        }
        .sub {
            color: #bcab6e;
            margin-bottom: 30px;
        }
        .weapons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
        }
        .weapon-slot {
            background: #0e130b;
            border-radius: 25px;
            padding: 25px;
            width: 260px;
            border: 1px solid #4e6b2c;
            transition: 0.2s;
        }
        .weapon-slot:hover {
            transform: translateY(-5px);
            border-color: #c9a03d;
        }
        .slot-label {
            background: #2a2416;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 40px;
            color: #eace7b;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .weapon-icon {
            font-size: 4rem;
            margin: 15px 0;
        }
        .weapon-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #f7f3da;
            background: #1e2817;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 40px;
        }
        .weapon-type {
            color: #b9b27a;
            margin-top: 12px;
            font-size: 0.8rem;
        }
        button {
            background: linear-gradient(145deg, #2c3e1f, #1e2a14);
            border: none;
            padding: 15px 35px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffeaac;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f130b;
            margin-top: 15px;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #0f130b;
        }
        .hint {
            color: #7f8c5e;
            margin-top: 20px;
            font-size: 0.8rem;
        }
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate {
            animation: pop 0.3s ease;
        }
        footer {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #6c6e4e;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        <span class="pan">🍳</span>
        PUBG RANDOMIZER
        <span class="pan">🍳</span>
    </h1>
    <div class="sub">🎲 нажми — получи 2 пушки | играй только с ними 🎲</div>

    <div class="weapons">
        <div class="weapon-slot" id="slot1">
            <div class="slot-label">ОСНОВНОЕ</div>
            <div class="weapon-icon" id="icon1">🔫</div>
            <div class="weapon-name" id="name1">—</div>
            <div class="weapon-type" id="type1">жду рандома</div>
        </div>
        <div class="weapon-slot" id="slot2">
            <div class="slot-label">ВТОРОЕ</div>
            <div class="weapon-icon" id="icon2">🔫</div>
            <div class="weapon-name" id="name2">—</div>
            <div class="weapon-type" id="type2">жду рандома</div>
        </div>
    </div>

    <button id="rollBtn">🎲 ВЫБРАТЬ ОРУЖИЕ 🎲</button>
    <div class="hint">⚡ нажми, чтобы получить новый набор | только эти два до конца матча ⚡</div>
    <footer>🔥 только наземный лут | нет крэйтов, нет карточных эксклюзивов 🔥</footer>
</div>

<script>
    // СПИСОК ОРУЖИЯ (только ground loot, все карты)
    const weapons = [
        "M416", "SCAR-L", "AKM", "Beryl M762", "M16A4", "ACE32",
        "Kar98k", "M24", "Dragunov SVD", "Mini-14", "SLR",
        "UMP-45", "Vector", "MP5K", "PP-19 Bizon", "Tommy Gun",
        "DBS", "S12K", "S686",
        "M249", "DP-28",
        "Crossbow", "Deagle", "Glock 18C", "P1911"
    ];

    const weaponIcons = {
        "M416": "🔫", "SCAR-L": "🔫", "AKM": "💥", "Beryl M762": "⚙️", "M16A4": "🎯", "ACE32": "🌍",
        "Kar98k": "🎯", "M24": "💀", "Dragunov SVD": "🎖️", "Mini-14": "📏", "SLR": "🔊",
        "UMP-45": "🛡️", "Vector": "🌀", "MP5K": "🔰", "PP-19 Bizon": "📀", "Tommy Gun": "🍂",
        "DBS": "🐉", "S12K": "🔧", "S686": "🎲",
        "M249": "⛓️", "DP-28": "📀",
        "Crossbow": "🏹", "Deagle": "💪", "Glock 18C": "🔫", "P1911": "⚙️"
    };

    const weaponTypes = {
        "M416": "Штурмовая винтовка", "SCAR-L": "Штурмовая винтовка", "AKM": "Штурмовая винтовка",
        "Beryl M762": "Штурмовая винтовка", "M16A4": "Штурмовая винтовка", "ACE32": "Штурмовая винтовка",
        "Kar98k": "Снайперская винтовка", "M24": "Снайперская винтовка", "Dragunov SVD": "Марксманская винтовка",
        "Mini-14": "Марксманская винтовка", "SLR": "Марксманская винтовка",
        "UMP-45": "Пистолет-пулемёт", "Vector": "Пистолет-пулемёт", "MP5K": "Пистолет-пулемёт",
        "PP-19 Bizon": "Пистолет-пулемёт", "Tommy Gun": "Пистолет-пулемёт",
        "DBS": "Дробовик", "S12K": "Дробовик", "S686": "Дробовик",
        "M249": "Пулемёт", "DP-28": "Пулемёт",
        "Crossbow": "Арбалет", "Deagle": "Пистолет", "Glock 18C": "Пистолет", "P1911": "Пистолет"
    };

    function getRandomWeapon() {
        return weapons[Math.floor(Math.random() * weapons.length)];
    }

    function getTwoWeapons() {
        let w1 = getRandomWeapon();
        let w2 = getRandomWeapon();
        while (w1 === w2) {
            w2 = getRandomWeapon();
        }
        return [w1, w2];
    }

    function animateSlot(slot) {
        slot.classList.add('animate');
        setTimeout(() => slot.classList.remove('animate'), 300);
    }

    function updateUI() {
        const [w1, w2] = getTwoWeapons();
        
        document.getElementById('name1').innerText = w1;
        document.getElementById('icon1').innerHTML = weaponIcons[w1] || "🔫";
        document.getElementById('type1').innerText = weaponTypes[w1];
        
        document.getElementById('name2').innerText = w2;
        document.getElementById('icon2').innerHTML = weaponIcons[w2] || "🔫";
        document.getElementById('type2').innerText = weaponTypes[w2];
        
        animateSlot(document.getElementById('slot1'));
        animateSlot(document.getElementById('slot2'));
    }

    document.getElementById('rollBtn').addEventListener('click', updateUI);
    
    // Запуск при загрузке
    updateUI();
</script>
</body>
</html>
