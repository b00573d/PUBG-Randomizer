<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PUBG Рандомайзер | 2 пушки (только универсальное оружие)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a2a1f, #0a0f0a);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 950px;
            width: 100%;
            background: rgba(10, 14, 8, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 60px 40px 60px 40px;
            border: 2px solid rgba(210, 180, 70, 0.7);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 200, 0.1);
            padding: 30px 25px 40px 25px;
            transition: all 0.2s;
            text-align: center;
        }

        .game-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #f5e56b, #c9a03d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 3px rgba(0,0,0,0.4);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .sub {
            color: #bcab6e;
            font-weight: 500;
            border-top: 1px dashed #5a4a2a;
            display: inline-block;
            padding-top: 8px;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .badge-universal {
            background: #3a4a2a;
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 10px;
            vertical-align: middle;
            color: #e9f5cf;
        }

        .weapons-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 35px;
            margin: 30px 0 35px;
        }

        .weapon-slot {
            background: #11170e;
            border-radius: 32px;
            padding: 20px 15px;
            width: 260px;
            min-width: 220px;
            flex: 1;
            box-shadow: 0 12px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,200,0.1);
            border: 1px solid #4e6b2c;
            transition: transform 0.2s ease;
        }

        .weapon-slot:hover {
            transform: translateY(-5px);
        }

        .slot-label {
            font-size: 1.2rem;
            background: #2a2416;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 40px;
            color: #eace7b;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid #7e6a3e;
        }

        .weapon-icon {
            font-size: 3.6rem;
            margin: 10px 0;
            filter: drop-shadow(2px 4px 6px black);
        }

        .weapon-name {
            font-size: 1.9rem;
            font-weight: 800;
            color: #f7f3da;
            text-shadow: 0 2px 0 #2f3e1c;
            margin: 12px 0 5px;
            word-break: break-word;
            background: #1e2817b3;
            display: inline-block;
            padding: 0 12px;
            border-radius: 60px;
        }

        .weapon-type {
            font-size: 0.85rem;
            color: #b9b27a;
            background: #1e2218;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 10px;
        }

        .randomize-btn {
            background: linear-gradient(145deg, #2c3e1f, #1e2a14);
            border: none;
            padding: 16px 32px;
            font-size: 1.7rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffeaac;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f130b;
            transition: 0.07s linear;
            width: 80%;
            max-width: 380px;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 10px auto;
            font-family: inherit;
        }

        .randomize-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #0f130b;
        }

        .reroll-hint {
            font-size: 0.85rem;
            margin-top: 20px;
            color: #7f8c5e;
            background: #1f261a70;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            80% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-weapon {
            animation: pop 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        footer {
            margin-top: 28px;
            font-size: 0.7rem;
            color: #6c6e4e;
        }

        @media (max-width: 650px) {
            .weapons-panel {
                gap: 20px;
            }
            .weapon-name {
                font-size: 1.4rem;
            }
            .randomize-btn {
                font-size: 1.3rem;
                padding: 12px 20px;
            }
            .card {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="game-title">
        🔫 PUBG ARMORY ROULETTE 
        <span class="badge-universal">🌍 все карты</span>
    </div>
    <div class="sub">🎲 нажми — получи 2 пушки | играй только с ними 🎲</div>

    <div class="weapons-panel">
        <div class="weapon-slot" id="weaponSlot1">
            <div class="slot-label">🔫 ОСНОВНОЕ</div>
            <div class="weapon-icon" id="weaponIcon1">🎯</div>
            <div class="weapon-name" id="weaponName1">—</div>
            <div class="weapon-type" id="weaponType1">жду рандома</div>
        </div>

        <div class="weapon-slot" id="weaponSlot2">
            <div class="slot-label">🔪 ВТОРОЕ</div>
            <div class="weapon-icon" id="weaponIcon2">⚡</div>
            <div class="weapon-name" id="weaponName2">—</div>
            <div class="weapon-type" id="weaponType2">жду рандома</div>
        </div>
    </div>

    <button class="randomize-btn" id="rollBtn">🎲 ВЫБРАТЬ ОРУЖИЕ 🎲</button>
    <div class="reroll-hint">⚡ нажми, чтобы получить новый набор | только эти два до конца матча ⚡</div>
    <footer>🔥 строгий режим: выпало то, с чем играешь. Без Win94 / карточных эксклюзивов 🔥</footer>
</div>

<script>
    // --------------------------------------------------------------
    // ТОЛЬКО УНИВЕРСАЛЬНОЕ ОРУЖИЕ PUBG (есть на всех основных картах)
    // Убрано: Win94 (только Miramar), QBZ (Sanhok), G36C (Vikendi), 
    // K2 (раньше эксклюзив), Lynx (редкий crate), O12 (дробовик с Deston)
    // Оставлены только те, что гарантированно есть в Erangel, Miramar, Taego, Deston, Vikendi, Sanhok
    // --------------------------------------------------------------
    const universalWeapons = [
        // Штурмовые винтовки (везде)
        { name: "M416", icon: "🔫", type: "Штурмовая винтовка" },
        { name: "SCAR-L", icon: "🎯", type: "Штурмовая винтовка" },
        { name: "AKM", icon: "💥", type: "Штурмовая винтовка" },
        { name: "Beryl M762", icon: "⚙️", type: "Штурмовая винтовка" },
        { name: "M16A4", icon: "🔭", type: "Штурмовая винтовка" },
        { name: "ACE32", icon: "🌍", type: "Штурмовая винтовка" },
        { name: "AUG A3", icon: "🔥", type: "Штурмовая винтовка (дроп/круг)" },
        { name: "FAMAS", icon: "🇫🇷", type: "Штурмовая винтовка (крэйт)" },
        
        // Снайперские / марксманские (везде)
        { name: "Kar98k", icon: "🎯", type: "Снайперская винтовка" },
        { name: "M24", icon: "💀", type: "Снайперская винтовка" },
        { name: "AWM", icon: "⚡", type: "Снайперская винтовка (крэйт)" },
        { name: "Mosin-Nagant", icon: "🌾", type: "Снайперская винтовка" },
        { name: "Dragunov SVD", icon: "🎖️", type: "Марксманская винтовка" },
        { name: "Mini-14", icon: "📏", type: "Марксманская винтовка" },
        { name: "SLR", icon: "🔊", type: "Марксманская винтовка" },
        { name: "Mk12", icon: "🌊", type: "Марксманская винтовка" },
        { name: "Mk14 EBR", icon: "🎖️", type: "Марксманская винтовка (крэйт)" },
        
        // Пистолеты-пулеметы (везде)
        { name: "UMP-45", icon: "🛡️", type: "Пистолет-пулемёт" },
        { name: "Vector", icon: "🌀", type: "Пистолет-пулемёт" },
        { name: "MP5K", icon: "🔰", type: "Пистолет-пулемёт" },
        { name: "PP-19 Bizon", icon: "📀", type: "Пистолет-пулемёт" },
        { name: "Tommy Gun", icon: "🍂", type: "Пистолет-пулемёт" },
        { name: "MP9", icon: "⚡", type: "Пистолет-пулемёт" },
        { name: "P90", icon: "💠", type: "Пистолет-пулемёт (крэйт)" },
        
        // Дробовики (везде)
        { name: "DBS", icon: "🐉", type: "Дробовик" },
        { name: "S12K", icon: "🔧", type: "Дробовик" },
        { name: "S686", icon: "🎲", type: "Дробовик" },
        
        // Пулеметы (везде)
        { name: "M249", icon: "⛓️", type: "Пулемёт" },
        { name: "DP-28", icon: "📀", type: "Пулемёт" },
        { name: "MG3", icon: "🌀", type: "Пулемёт (крэйт)" },
        
        // Арбалет + пистолеты (универсальные)
        { name: "Crossbow", icon: "🏹", type: "Арбалет" },
        { name: "Deagle", icon: "💪", type: "Пистолет .45" },
        { name: "P18C", icon: "🔫", type: "Автоматический пистолет" },
        { name: "P1911", icon: "⚙️", type: "Пистолет" },
        { name: "R1895", icon: "💥", type: "Револьвер" },
        { name: "Skorpion", icon: "⚡", type: "Пистолет-пулемёт (пистолет)" }
    ];
    
    // Дополнительно добавим Win94 НЕТ! убрали навсегда, но для полноты удалим и карточный K2, QBZ и G36C отсутствуют.
    // Убедимся, что список полностью кроссплатформенный: DBS есть везде, MP9 в Deston? MP9 сейчас на многих картах.
    // Используем финальный список
    
    // Для разнообразия продублируем редкие варианты, но без привязки к картам
    const finalWeaponList = [...universalWeapons];
    
    // Дополнительно добавим одно-два оружия, которые реально везде: 
    // Можем еще добавить Winchester? НЕТ. только то, что точно на всех картах.
    // Готово
    
    function getRandomWeapon() {
        const randomIndex = Math.floor(Math.random() * finalWeaponList.length);
        return { ...finalWeaponList[randomIndex] };
    }
    
    // функция для двух разных пушек (если одинаковые редки, но сделаем рерол второго)
    function getTwoDistinctWeapons() {
        let weaponA = getRandomWeapon();
        let weaponB = getRandomWeapon();
        let attempts = 0;
        while (weaponA.name === weaponB.name && attempts < 6) {
            weaponB = getRandomWeapon();
            attempts++;
        }
        return [weaponA, weaponB];
    }
    
    // DOM элементы
    const weaponName1 = document.getElementById('weaponName1');
    const weaponIcon1 = document.getElementById('weaponIcon1');
    const weaponType1 = document.getElementById('weaponType1');
    const weaponName2 = document.getElementById('weaponName2');
    const weaponIcon2 = document.getElementById('weaponIcon2');
    const weaponType2 = document.getElementById('weaponType2');
    const rollBtn = document.getElementById('rollBtn');
    const slot1Div = document.getElementById('weaponSlot1');
    const slot2Div = document.getElementById('weaponSlot2');
    
    function animateSlot(slotElement) {
        slotElement.classList.add('animate-weapon');
        setTimeout(() => {
            slotElement.classList.remove('animate-weapon');
        }, 300);
    }
    
    function updateWeapons() {
        const [weaponObj1, weaponObj2] = getTwoDistinctWeapons();
        
        weaponName1.innerText = weaponObj1.name;
        weaponIcon1.innerText = weaponObj1.icon;
        weaponType1.innerText = weaponObj1.type;
        
        weaponName2.innerText = weaponObj2.name;
        weaponIcon2.innerText = weaponObj2.icon;
        weaponType2.innerText = weaponObj2.type;
        
        animateSlot(slot1Div);
        animateSlot(slot2Div);
        
        rollBtn.style.transform = "scale(0.98)";
        setTimeout(() => { rollBtn.style.transform = ""; }, 100);
    }
    
    function initRandomOnLoad() {
        const [firstWeapon, secondWeapon] = getTwoDistinctWeapons();
        weaponName1.innerText = firstWeapon.name;
        weaponIcon1.innerText = firstWeapon.icon;
        weaponType1.innerText = firstWeapon.type;
        
        weaponName2.innerText = secondWeapon.name;
        weaponIcon2.innerText = secondWeapon.icon;
        weaponType2.innerText = secondWeapon.type;
        
        setTimeout(() => {
            animateSlot(slot1Div);
            animateSlot(slot2Div);
        }, 100);
    }
    
    rollBtn.addEventListener('click', () => {
        updateWeapons();
        rollBtn.style.boxShadow = "0 5px 0 #0f130b";
        setTimeout(() => {
            rollBtn.style.boxShadow = "0 8px 0 #0f130b";
        }, 80);
    });
    
    initRandomOnLoad();
    
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !e.repeat && document.activeElement !== rollBtn) {
            e.preventDefault();
            updateWeapons();
            rollBtn.style.transform = "scale(0.96)";
            setTimeout(() => { if(rollBtn) rollBtn.style.transform = ""; }, 120);
        }
    });
    
    const slots = [slot1Div, slot2Div];
    slots.forEach(slot => {
        slot.addEventListener('mouseenter', () => {
            slot.style.borderColor = "#cfb053";
            slot.style.transition = "0.2s";
        });
        slot.addEventListener('mouseleave', () => {
            slot.style.borderColor = "#4e6b2c";
        });
    });
    
    console.log("✅ PUBG рандомайзер без Win94 и карточных эксклюзивов. Только универсальное оружие!");
</script>
</body>
</html>
